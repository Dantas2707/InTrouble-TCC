name: crud
description: "A new Flutter project."
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # intl precisa casar com o que o SDK fixa:
  intl: ^0.20.2

  cloud_firestore: ^5.6.12
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.1
  firebase_storage: ^12.4.5
  file_picker: ^10.1.9
  cupertino_icons: ^1.0.8
  permission_handler: ^11.4.0
  flutter_background_messenger: ^0.0.2
  http: ^1.4.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.13.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  open_filex: ^4.4.0
  image_picker: ^1.2.0
  camera: ^0.11.0+2
  record: ^6.1.2
  just_audio: ^0.9.18
  url_launcher: ^6.3.2
  provider: ^6.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icone.png"
  min_sdk_android: 23
  adaptive_icon_background: "#ffffff"
